name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # 24: unflagged TypeScript type-stripping (≥23.6) so the
          # rotation-engine's `node --test` runs its .ts suite with no install.
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Rotation engine unit tests (TICKET-10 — pure lib, zero-dep)
        run: node --test
        working-directory: packages/rotation-engine

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright e2e
        run: npm run test:e2e
        env:
          # Node.js 22+ localStorage global needs a file path to be functional during Next.js SSR
          NODE_OPTIONS: "--localstorage-file=/tmp/cantai-ls.json"
