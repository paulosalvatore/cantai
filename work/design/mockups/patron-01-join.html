<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cantai — entrada</title>
<link rel="stylesheet" href="cantai.css">
</head>
<body>
<div class="mock-nav"><a href="index.html">mockups</a> · 1/3</div>
<div class="phone">
  <div class="phone-topbar">
    <span class="wordmark">cantai</span>
    <span class="chip">Bar do Zé</span>
  </div>

  <div class="stack" style="gap:24px; padding-top:12px;">
    <div>
      <h1 class="display">Bora cantar! 🎤</h1>
      <p class="muted" style="margin-top:8px; font-size:16px;">Sem cadastro, sem senha. Diz teu nome e entra na festa.</p>
    </div>

    <div class="field">
      <label class="label" for="nick">Teu apelido</label>
      <input class="input" id="nick" value="Marina" placeholder="Como te chamam?">
    </div>

    <div class="field">
      <label class="label" for="table">Mesa <span style="text-transform:none; letter-spacing:0; color:var(--c-text-dim); font-weight:400;">(opcional)</span></label>
      <input class="input" id="table" value="7" placeholder="Nº da mesa" style="max-width:140px;">
    </div>

    <div class="field">
      <span class="label">Como você quer entrar?</span>
      <div class="mode-grid">
        <div class="mode-card selected" role="radio" aria-checked="true">
          <span class="emoji">🎤</span>
          <span class="mode-name">Cantar</span>
          <span class="mode-desc">Entro na fila pra pegar o mic</span>
        </div>
        <div class="mode-card" role="radio" aria-checked="false">
          <span class="emoji">🎶</span>
          <span class="mode-name">Só curtir</span>
          <span class="mode-desc">Peço música, mas sem cantar</span>
        </div>
      </div>
    </div>
  </div>

  <div class="footer-cta">
    <a class="btn-primary" href="patron-02-pick-song.html">Bora cantar! →</a>
    <p class="meta" style="text-align:center; margin-top:12px;">Ao entrar você concorda em soltar a voz 😄</p>
  </div>
</div>
</body>
</html>
